<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flatten Array</title>
</head>
<body>
    <div id="root"></div>
    <script>
        let arr = [1,2,[3,4],[5,6]];

        let ans = arr.flat();

        document.getElementById("root").innerText = ans;
    </script>
</body>
</html>
