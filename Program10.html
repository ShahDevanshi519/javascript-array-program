<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Left Rotate by K Positions</title>
</head>
<body>
    <div id="root"></div>
    <script>
        let a = [1,2,3,4,5];
        let k = 2;

        for(let i=0;i<2;i++){
            let first = a.shift();
            a.push(first);
        }

        document.getElementById("root").innerText = a;
    </script>
</body>
</html>
