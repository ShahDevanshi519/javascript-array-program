<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avg Of Number</title>
</head>
<body>
    <div id="root"></div>
    <script>
        let a = [4,5,7,1,2,3,6,9,8,10,55];

        let sum = 0;
        let avg = 1;

        for(let i=0;i<a.length;i++){
            sum = sum + a[i];
        }

        avg = (sum)/a.length;

        document.getElementById("root").innerText = "Average Of Number = " + avg;
    </script>
</body>
</html>
