<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum Of Array</title>
</head>
<body>
    <div id="root"></div>
    <script>
        let a = [5,4,1,2,3,6,7,8,9,10];
        let sum = 0;
        for(let i=0;i<a.length;i++){
            sum = sum + a[i];
        }

        document.getElementById("root").innerText = "Sum Of Array = " + sum;
    </script>
</body>
</html>
