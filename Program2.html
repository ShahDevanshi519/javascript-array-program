<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Smallest Number</title>
</head>
<body>
    <div id="root"></div>
    <script>
        let a = [5,7,4,1,2,9,8,6,3,55];

        let min = a[0];

        for(let i=0;i<a.length;i++){
            if(a[i] < min){
                min = a[i];
            }
        }

        document.getElementById("root").innerText = "Minimum Number = " + min;
    </script>
</body>
</html>
