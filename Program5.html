<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse Array</title>
</head>
<body>
    <div id="root"></div>
    <script>
        let arr = [1,4,7,8,5,2,3,6,9,10];

        let ans = arr.reverse();

        document.getElementById("root").innerText = ans;
    </script>
</body>
</html>
