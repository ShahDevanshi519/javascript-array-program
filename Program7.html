<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remove Duplicates</title>
</head>
<body>
    <div id="root"></div>
    <script>
        let a = [1,4,4,5,7,8,9,6,5];

        let ans = [...new Set(a)];

        document.getElementById("root").innerText = ans;

    </script>
</body>
</html>
